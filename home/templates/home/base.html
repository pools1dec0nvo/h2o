{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}orbis{% endblock %}</title>
  <link rel="icon" type="image/jpeg" href="{% static 'home/img/favicon.jpg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'home/css/navbar.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/dept.css' %}">
  <link rel="stylesheet" href="{% static 'home/css/navbar_mobile.css' %}">
  {% block extra_css %}{% endblock %}
  <script>
    // Apply saved theme before first paint to avoid flash
    (function() {
      if (localStorage.getItem('orbis-theme') === 'dark')
        document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% include "home/navbar.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
  <script>
    // Sticky navbar: add .scrolled to body once hero is out of view
    const hero = document.querySelector('.hero');
    if (hero) {
      const sentinel = new IntersectionObserver(([entry]) => {
        document.body.classList.toggle('scrolled', !entry.isIntersecting);
      }, { threshold: 0 });
      sentinel.observe(hero);
    }

    // Emoji theme toggle (desktop + mobile)
    const themeToggle = document.getElementById('themeToggle');
    const themeToggleMobile = document.getElementById('themeToggleMobile');
    function applyTheme(dark) {
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('orbis-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('orbis-theme', 'light');
      }
      const icon = dark ? '☀️' : '🌙';
      if (themeToggle) themeToggle.textContent = icon;
      if (themeToggleMobile) themeToggleMobile.textContent = icon;
    }
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(isDark);
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
      });
    }
    if (themeToggleMobile) {
      themeToggleMobile.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
      });
    }

    // Active nav pill tracker + mobile section title
    (function () {
      const NAV_SECTIONS = ['why', 'what', 'phases', 'who', 'roadmap'];
      const NAV_LABELS = {
        why: 'Motivation',
        what: 'Our Solution',
        phases: 'Stages',
        who: 'Team',
        roadmap: 'Roadmap',
      };

      const pill = document.getElementById('navPill');
      const centre = document.querySelector('.orbis-nav__centre');
      const mobileTitle = document.getElementById('navMobileTitle');

      function movePill(sectionId) {
        if (!pill || !centre) return;
        const item = document.querySelector(`.orbis-nav__item[data-section="${sectionId}"]`);
        if (!item) return;
        const cr = centre.getBoundingClientRect();
        const ir = item.getBoundingClientRect();
        pill.style.left   = (ir.left - cr.left) + 'px';
        pill.style.width  = ir.width + 'px';
        pill.style.top    = ((cr.height - ir.height) / 2) + 'px';
        pill.style.height = ir.height + 'px';
        pill.style.opacity = '1';
      }

      function hidePill() {
        if (pill) pill.style.opacity = '0';
      }

      function setMobileTitle(label) {
        if (!mobileTitle) return;
        if (mobileTitle.dataset.current === label) return;
        mobileTitle.dataset.current = label;
        mobileTitle.classList.add('is-changing');
        setTimeout(function () {
          mobileTitle.textContent = label;
          mobileTitle.classList.remove('is-changing');
        }, 140);
      }

      // Track which sections are in view
      const inView = new Set();

      const sectionObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            inView.add(e.target.id);
          } else {
            inView.delete(e.target.id);
          }
        });

        if (inView.size === 0) {
          hidePill();
          return;
        }

        // Pick the topmost visible tracked section
        let topmost = null;
        let topmostY = Infinity;
        inView.forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            const y = el.getBoundingClientRect().top;
            if (y < topmostY) { topmostY = y; topmost = id; }
          }
        });

        if (topmost) {
          movePill(topmost);
          setMobileTitle(NAV_LABELS[topmost] || 'Welcome!');
        } else {
          hidePill();
        }
      }, { threshold: 0.15 });

      NAV_SECTIONS.forEach(id => {
        const el = document.getElementById(id);
        if (el) sectionObserver.observe(el);
      });

      // Reset title + hide pill whenever the hero is visible (no condition on inView)
      const heroEl = document.querySelector('.hero');
      if (heroEl) {
        const heroObserver = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            hidePill();
            setMobileTitle('Welcome!');
          }
        }, { threshold: 0 });
        heroObserver.observe(heroEl);
      }

      // Reposition pill on resize
      window.addEventListener('resize', () => {
        if (pill && parseFloat(pill.style.opacity) > 0) {
          const visibleSection = [...inView][0];
          if (visibleSection) movePill(visibleSection);
        }
      });
    })();

    // Dropdown links that open accordions after scroll lands
    document.querySelectorAll('[data-open-accordion]').forEach(function (link) {
      link.addEventListener('click', function () {
        const btnId = link.dataset.openAccordion;
        setTimeout(function () {
          const btn = document.getElementById(btnId);
          if (btn && btn.getAttribute('aria-expanded') !== 'true') btn.click();
        }, 500);
      });
    });

    // Mobile hamburger menu
    const burger = document.getElementById('navBurger');
    const drawer = document.getElementById('navDrawer');
    if (burger && drawer) {
      burger.addEventListener('click', function () {
        const open = burger.getAttribute('aria-expanded') === 'true';
        burger.setAttribute('aria-expanded', String(!open));
        drawer.setAttribute('aria-hidden', String(open));
        burger.classList.toggle('is-open', !open);
        drawer.classList.toggle('is-open', !open);
      });
      // Close drawer when a link is tapped
      drawer.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          burger.setAttribute('aria-expanded', 'false');
          drawer.setAttribute('aria-hidden', 'true');
          burger.classList.remove('is-open');
          drawer.classList.remove('is-open');
        });
      });
    }
  </script>
</body>
</html>
