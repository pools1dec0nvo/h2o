{% load static %}
<!-- ── Hero ──────────────────────────────────────────────────── -->
<section class="hero" id="hero" style="background-image: url('{% static 'home/img/hero.png' %}');">
  <div class="hero__overlay"></div>
  <div class="hero__inner">
    <div class="hero__title-pill">
      <p class="hero__subtitle">ElectroDay 2025/2026, IST</p>
      <h1 class="hero__title">Disaster-ready water<br>storage system for cities</h1>
    </div>
    <div class="hero__actions">
      <a href="/blog/" class="btn btn--ghost">Read our blog!</a>
      <a href="#who" class="btn btn--solid">Contact us</a>
    </div>
  </div>
  <div class="hero__scroll">
    <span class="hero__scroll-label">Scroll down</span>
    <svg class="hero__scroll-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>
</section>
