{% load static %}
<nav class="h2o-nav" id="h2o-nav">

  <!-- Brand -->
  <a href="/" class="h2o-nav__brand">
    <img src="{% static 'home/img/favicon.jpg' %}" alt="h2o" class="h2o-nav__logo">
  </a>

  <!-- Centre links + sliding pill -->
  <div class="h2o-nav__centre">
    <span class="h2o-nav__pill" id="navPill" aria-hidden="true"></span>

    <ul class="h2o-nav__links" id="navLinks">

      <li class="h2o-nav__item" data-section="why">
        <a href="/#why" class="h2o-nav__link">Motivation</a>
      </li>

      <li class="h2o-nav__item h2o-nav__item--has-dropdown" data-section="what">
        <a href="/#what" class="h2o-nav__link">Our Solution</a>
        <ul class="h2o-nav__dropdown">
          <li><a href="/#what" data-open-accordion="specs-toggle" class="h2o-nav__dropdown-link">Tech Specs</a></li>
        </ul>
      </li>

      <li class="h2o-nav__item" data-section="phases">
        <a href="/#phases" class="h2o-nav__link">Stages</a>
      </li>

      <li class="h2o-nav__item h2o-nav__item--has-dropdown" data-section="who">
        <a href="/#who" class="h2o-nav__link">Team</a>
        <ul class="h2o-nav__dropdown">
          <li><a href="/#who" data-open-accordion="dept-toggle" class="h2o-nav__dropdown-link">Departments</a></li>
        </ul>
      </li>

      <li class="h2o-nav__item" data-section="roadmap">
        <a href="/#roadmap" class="h2o-nav__link">Roadmap</a>
      </li>

    </ul>
  </div>

  <!-- Right-side controls -->
  <div class="h2o-nav__right">
    <button class="h2o-nav__theme-btn" id="themeToggle" aria-label="Toggle theme"></button>

    <a href="/blog/" class="btn btn--solid h2o-nav__btn">Blog</a>

    {% if user.is_authenticated %}
      <a href="{% url 'home:profile' %}" class="h2o-nav__username">{{ user.get_full_name|default:user.username }}</a>
      <a href="/logout/" class="btn btn--ghost h2o-nav__btn">Log Out</a>
    {% else %}
      <a href="/login/" class="btn btn--ghost h2o-nav__btn">Log In</a>
    {% endif %}
  </div>

</nav>
