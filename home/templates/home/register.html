{% extends "home/auth_base.html" %}

{% block title %}Register — orbis{% endblock %}

{% block auth_content %}
<h1 class="auth-card__title">Create account</h1>

<form method="post" enctype="multipart/form-data" class="auth-form">
  {% csrf_token %}

  {% for field in form %}
  <div class="auth-form__field {% if field.errors %}auth-form__field--error{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% for error in field.errors %}
    <span class="auth-form__field-error">{{ error }}</span>
    {% endfor %}
  </div>
  {% endfor %}

  <button type="submit" class="auth-form__submit">Create account</button>
</form>

<p class="auth-card__switch">
  Already have an account? <a href="{% url 'home:login' %}">Log in</a>
</p>
{% endblock %}
